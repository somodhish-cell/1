# Render Blueprint — deploys this app as-is with a persistent disk.
# In the Render dashboard: New + → Blueprint → point at this repo.
services:
  - type: web
    name: aurora-goods
    runtime: node
    plan: free
    buildCommand: npm ci
    # Seed (idempotent) then start.
    startCommand: node src/seed.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true # Render generates a strong random value
      - key: ADMIN_USERNAME
        value: admin
      # ADMIN_PASSWORD is omitted on purpose -> defaults to "admin123".
      # Change it any time in the Render dashboard, or in Admin → Settings.
      - key: DATABASE_URL
        value: file:/var/data/app.db
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: data
      mountPath: /var/data # holds both the libSQL file and uploaded images
      sizeGB: 1
